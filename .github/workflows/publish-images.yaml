name: Publish versioned application images

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic image version, for example v1.1.0
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: chibank-frontend
            context: techbleat-global-bank-frontend
          - image: chibank-user-service
            context: techbleat-global-bank-backend/user-service
          - image: chibank-transaction-service
            context: techbleat-global-bank-backend/transaction-service
          - image: chibank-activity-service
            context: techbleat-global-bank-backend/activity-service
    steps:
      - uses: actions/checkout@v7
      - name: Validate semantic version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]
      - name: Sign in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build immutable image
        run: docker build -t chigoldd/${{ matrix.image }}:${{ inputs.version }} ${{ matrix.context }}
      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: chigoldd/${{ matrix.image }}:${{ inputs.version }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Push image
        run: docker push chigoldd/${{ matrix.image }}:${{ inputs.version }}

