name: CI Quality Security Gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

env:
  IMAGE_TAG: ci-${{ github.sha }}
  IMAGE_REGISTRY: chigoldd

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    needs: secrets
    defaults:
      run:
        working-directory: techbleat-global-bank-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: techbleat-global-bank-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

  python-tests:
    name: Python service tests
    runs-on: ubuntu-latest
    needs: secrets
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - activity-service
    defaults:
      run:
        working-directory: techbleat-global-bank-backend/${{ matrix.service }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: techbleat-global-bank-backend/${{ matrix.service }}/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: PYTHONPATH=. pytest -q

  java-tests:
    name: Transaction service tests
    runs-on: ubuntu-latest
    needs: secrets
    defaults:
      run:
        working-directory: techbleat-global-bank-backend/transaction-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests
        run: mvn test

  sonar:
    name: SonarQube static analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    needs:
      - frontend-tests
      - python-tests
      - java-tests
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Java for SonarQube analysis
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile transaction service for SonarQube Java analysis
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' }}
        working-directory: techbleat-global-bank-backend/transaction-service
        run: mvn -q -DskipTests compile

      - name: Create SonarQube scanner configuration
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' }}
        run: |
          {
            echo "sonar.projectKey=${SONAR_PROJECT_KEY}"
            if [ -n "${SONAR_ORGANIZATION}" ]; then
              echo "sonar.organization=${SONAR_ORGANIZATION}"
            fi
            echo "sonar.sources=techbleat-global-bank-frontend/src,techbleat-global-bank-backend/user-service/app,techbleat-global-bank-backend/activity-service/app,techbleat-global-bank-backend/transaction-service/src/main/java"
            echo "sonar.tests=techbleat-global-bank-frontend/src/App.test.jsx,techbleat-global-bank-frontend/src/test,techbleat-global-bank-backend/user-service/tests,techbleat-global-bank-backend/activity-service/tests,techbleat-global-bank-backend/transaction-service/src/test/java"
            echo "sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/target/**,**/.venv/**,**/venv/**,techbleat-global-bank-frontend/src/**/*.test.jsx,techbleat-global-bank-frontend/src/test/**"
            echo "sonar.test.inclusions=**/*.test.jsx,**/tests/**/*.py,**/src/test/**/*.java"
            echo "sonar.java.binaries=techbleat-global-bank-backend/transaction-service/target/classes"
          } > sonar-project.properties

      - name: Show SonarQube scanner configuration
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' }}
        run: |
          echo "SONAR_HOST_URL=${SONAR_HOST_URL}"
          echo "SONAR_PROJECT_KEY=${SONAR_PROJECT_KEY}"
          echo "SONAR_ORGANIZATION=${SONAR_ORGANIZATION}"
          sed -n '1,120p' sonar-project.properties

      - name: Run SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Skip SonarQube scan when secrets are missing
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == '' || env.SONAR_PROJECT_KEY == '' }}
        run: echo "SONAR_TOKEN, SONAR_HOST_URL, or SONAR_PROJECT_KEY is not configured; skipping SonarQube scan."

  checkov:
    name: Dockerfile security scan
    runs-on: ubuntu-latest
    needs:
      - frontend-tests
      - python-tests
      - java-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile
          output_format: cli

  build-and-scan-images:
    name: Build and Trivy scan images
    runs-on: ubuntu-latest
    needs:
      - frontend-tests
      - python-tests
      - java-tests
      - sonar
      - checkov
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: chibank-frontend
            context: techbleat-global-bank-frontend
          - image: chibank-user-service
            context: techbleat-global-bank-backend/user-service
          - image: chibank-activity-service
            context: techbleat-global-bank-backend/activity-service
          - image: chibank-transaction-service
            context: techbleat-global-bank-backend/transaction-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_REGISTRY }}/${{ matrix.image }}:${{ env.IMAGE_TAG }} ${{ matrix.context }}

      - name: Scan image with Trivy
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          format: table
          output: trivy-${{ matrix.image }}.txt
          exit-code: "1"
          ignore-unfixed: true

      - name: Show Trivy report
        if: always()
        run: cat trivy-${{ matrix.image }}.txt

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-trivy-${{ matrix.image }}
          path: trivy-${{ matrix.image }}.txt

      - name: Fail on HIGH or CRITICAL vulnerabilities
        if: steps.trivy.outcome == 'failure'
        run: exit 1
