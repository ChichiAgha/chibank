global:
  namespace: banking
  imagePullPolicy: IfNotPresent
  frontendOrigin: http://bleatbank.local

images:
  frontend:
    repository: your-dockerhub/bleatbank-frontend
    tag: "1.0.0"
  userService:
    repository: your-dockerhub/bleatbank-user-service
    tag: "1.0.0"
  transactionService:
    repository: your-dockerhub/bleatbank-transaction-service
    tag: "1.0.0"
  activityService:
    repository: your-dockerhub/bleatbank-activity-service
    tag: "1.0.0"

frontend:
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

userService:
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 256Mi

transactionService:
  replicas: 1
  port: 8080
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

activityService:
  replicas: 1
  port: 8001
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 256Mi

postgres:
  image:
    repository: postgres
    tag: "15"
  database: bankingdb
  username: banking_user
  password: change-me
  port: 5432
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  image:
    repository: redis
    tag: "7"
  port: 6379
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

kafka:
  image:
    repository: confluentinc/cp-kafka
    tag: "8.1.1"
  port: 29092
  controllerPort: 29093
  externalPort: 9092
  jmxPort: 9101
  clusterId: MkU3OEVBNTcwNTJENDM2Qk
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: 750m
      memory: 1Gi

ingress:
  enabled: true
  className: nginx
  host: bleatbank.local

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
  prometheusRules:
    enabled: true
