apiVersion: v1
kind: Service
metadata:
  name: activity-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: activity-service
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: bleatbank
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: activity-service
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.activityService.port }}
      targetPort: http
      protocol: TCP
