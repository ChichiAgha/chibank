apiVersion: v1
kind: Secret
metadata:
  name: bleatbank-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/part-of: bleatbank
type: Opaque
stringData:
  postgres-user: {{ .Values.postgres.username | quote }}
  postgres-password: {{ required "postgres.password must be supplied through a protected values file or --set-string" .Values.postgres.password | quote }}
  database-url: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@postgres:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
