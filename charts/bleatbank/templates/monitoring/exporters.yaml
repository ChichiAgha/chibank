{{- if and .Values.monitoring.enabled .Values.monitoring.exporters.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: bleatbank
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-exporter
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: bleatbank
    spec:
      containers:
        - name: exporter
          image: {{ .Values.monitoring.exporters.postgres.image | quote }}
          args: ["--web.listen-address=:{{ .Values.monitoring.exporters.postgres.port }}"]
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: bleatbank-secret
                  key: database-url
          ports:
            - name: metrics
              containerPort: {{ .Values.monitoring.exporters.postgres.port }}
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: postgres-exporter
spec:
  selector: { app.kubernetes.io/name: postgres-exporter }
  ports:
    - name: metrics
      port: {{ .Values.monitoring.exporters.postgres.port }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: {{ .Values.global.namespace }}
  labels:
    release: {{ .Values.monitoring.releaseLabel }}
spec:
  selector:
    matchLabels: { app.kubernetes.io/name: postgres-exporter }
  endpoints:
    - port: metrics
      interval: 30s
---
